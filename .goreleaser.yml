version: 2

# Note: production releases use .github/workflows/release.yml which also builds
# .dmg / .AppImage / NSIS .exe packages not produced by goreleaser.
# This file is kept for local snapshot builds (`goreleaser release --snapshot --clean`).

before:
  hooks:
    - go mod tidy
    - bash -c "cd frontend && npm ci && npm run build"
    - bash -c "cd frontend-install && npm ci && npm run build"

builds:
  - id: daemon-linux
    binary: krouter
    main: ./cmd/krouter
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

  - id: daemon-darwin
    binary: krouter
    main: ./cmd/krouter
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

  - id: daemon-windows
    binary: krouter
    main: ./cmd/krouter
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

  - id: installer-linux
    binary: krouter-installer
    main: ./cmd/krouter-installer
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

  - id: installer-darwin
    binary: krouter-installer
    main: ./cmd/krouter-installer
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

  - id: installer-windows
    binary: krouter-installer
    main: ./cmd/krouter-installer
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -H windowsgui
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: linux
    ids:
      - daemon-linux
      - installer-linux
    name_template: "krouter_{{.Version}}_linux_{{.Arch}}"
    formats:
      - tar.gz

  - id: darwin
    ids:
      - daemon-darwin
      - installer-darwin
    name_template: "krouter_{{.Version}}_darwin_{{.Arch}}"
    formats:
      - tar.gz

  - id: windows
    ids:
      - daemon-windows
      - installer-windows
    name_template: "krouter_{{.Version}}_windows_{{.Arch}}"
    formats:
      - zip

nfpms:
  - id: linux-packages
    package_name: krouter
    homepage: https://kinthai.ai
    maintainer: kinthai team <hi@kinthai.ai>
    description: Local LLM proxy daemon – routes AI agent requests to the cheapest provider.
    license: MIT
    formats:
      - deb
      - rpm
    ids:
      - daemon-linux
    contents:
      - src: ./packaging/postinstall.sh
        dst: /usr/share/doc/krouter/postinstall.sh
        file_info:
          mode: 0755
    scripts:
      postinstall: packaging/postinstall.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{incpatch .Version}}-SNAPSHOT-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
