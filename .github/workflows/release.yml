name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: krouter-linux-amd64
          - name: darwin
            os: macos-latest
            goos: darwin
            output: krouter-darwin  # builds both arches in one step
          - name: windows-amd64
            os: ubuntu-latest
            goos: windows
            goarch: amd64
            output: krouter-windows-amd64.exe
            install_mingw: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install mingw (Windows cross-compile)
        if: matrix.install_mingw
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build Linux
        if: matrix.name == 'linux-amd64'
        env:
          CGO_ENABLED: 1
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/krouter-linux-amd64 \
            ./cmd/krouter

      - name: Build Darwin (amd64 + arm64)
        if: matrix.name == 'darwin'
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p dist
          GOARCH=amd64 go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/krouter-darwin-amd64 \
            ./cmd/krouter
          GOARCH=arm64 go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/krouter-darwin-arm64 \
            ./cmd/krouter

      - name: Build Windows
        if: matrix.name == 'windows-amd64'
        env:
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          GOOS: windows
          GOARCH: amd64
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/krouter-windows-amd64.exe \
            ./cmd/krouter

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.name }}
          path: dist/

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create archives and checksums
        run: |
          cd dist
          VERSION=${{ github.ref_name }}
          chmod +x krouter-linux-amd64 krouter-darwin-amd64 krouter-darwin-arm64
          tar -czf krouter_${VERSION}_linux_amd64.tar.gz    krouter-linux-amd64
          tar -czf krouter_${VERSION}_darwin_amd64.tar.gz   krouter-darwin-amd64
          tar -czf krouter_${VERSION}_darwin_arm64.tar.gz   krouter-darwin-arm64
          zip      krouter_${VERSION}_windows_amd64.zip     krouter-windows-amd64.exe
          sha256sum krouter_*.tar.gz krouter_*.zip > checksums.txt

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          gh release create ${VERSION} \
            --title "krouter ${VERSION}" \
            --notes "See [CHANGELOG](https://github.com/kinthaiofficial/krouter/blob/main/CHANGELOG.md) for details." \
            dist/krouter_*.tar.gz \
            dist/krouter_*.zip \
            dist/checksums.txt \
            dist/krouter-linux-amd64 \
            dist/krouter-darwin-amd64 \
            dist/krouter-darwin-arm64 \
            dist/krouter-windows-amd64.exe

      - name: Generate and sign manifest.json
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          echo "$SIGNING_PRIVATE_KEY" > /tmp/signing_key.pem
          go run scripts/gen-manifest.go \
            -version=${{ github.ref_name }} \
            -dist=dist \
            -key=/tmp/signing_key.pem \
            -repo=kinthaiofficial/krouter \
            -out=dist/manifest.json
          rm -f /tmp/signing_key.pem

      - name: Upload manifest to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/manifest.json \
            dist/manifest.json.sig
