name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    name: Build frontend (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: internal/webui/dist/

  frontend-install:
    name: Build frontend (install wizard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-install/package-lock.json

      - name: Install and build
        working-directory: frontend-install
        run: npm ci && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: installer-dist
          path: internal/webui/installer/dist/

  build:
    name: Build (${{ matrix.name }})
    needs: [frontend, frontend-install]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
          - name: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            install_aarch64_gcc: true
          - name: darwin
            os: macos-latest
            goos: darwin
          - name: windows
            os: ubuntu-latest
            goos: windows
            goarch: amd64
            install_mingw: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: internal/webui/dist/

      - name: Download installer dist
        uses: actions/download-artifact@v4
        with:
          name: installer-dist
          path: internal/webui/installer/dist/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install cross-compilers
        if: matrix.install_mingw || matrix.install_aarch64_gcc
        run: |
          pkgs=""
          [ "${{ matrix.install_mingw }}" = "true" ]        && pkgs="$pkgs gcc-mingw-w64-x86-64"
          [ "${{ matrix.install_aarch64_gcc }}" = "true" ]  && pkgs="$pkgs gcc-aarch64-linux-gnu"
          sudo apt-get install -y $pkgs

      - name: Build Linux amd64
        if: matrix.name == 'linux-amd64'
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p dist
          LFLAGS="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "$LFLAGS" -o dist/krouter-linux-amd64 ./cmd/krouter
          go build -ldflags "$LFLAGS" -o dist/krouter-installer-linux-amd64 ./cmd/krouter-installer

      - name: Build Linux arm64
        if: matrix.name == 'linux-arm64'
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
        run: |
          mkdir -p dist
          LFLAGS="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "$LFLAGS" -o dist/krouter-linux-arm64 ./cmd/krouter
          go build -ldflags "$LFLAGS" -o dist/krouter-installer-linux-arm64 ./cmd/krouter-installer

      - name: Build Darwin (amd64 + arm64 + universal)
        if: matrix.name == 'darwin'
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p dist
          LFLAGS="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARCH=amd64 go build -ldflags "$LFLAGS" -o dist/krouter-apple-macos-amd64 ./cmd/krouter
          GOARCH=arm64 go build -ldflags "$LFLAGS" -o dist/krouter-apple-macos-arm64 ./cmd/krouter
          lipo -create -output dist/krouter-apple-macos \
            dist/krouter-apple-macos-amd64 dist/krouter-apple-macos-arm64
          GOARCH=amd64 go build -ldflags "$LFLAGS" \
            -o dist/krouter-installer-apple-macos-amd64 ./cmd/krouter-installer
          GOARCH=arm64 go build -ldflags "$LFLAGS" \
            -o dist/krouter-installer-apple-macos-arm64 ./cmd/krouter-installer
          lipo -create -output dist/krouter-installer-apple-macos \
            dist/krouter-installer-apple-macos-amd64 dist/krouter-installer-apple-macos-arm64

      - name: Build Windows
        if: matrix.name == 'windows'
        env:
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p dist
          LFLAGS="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "$LFLAGS" -o dist/krouter-windows.exe ./cmd/krouter
          go build -ldflags "$LFLAGS -H windowsgui" \
            -o dist/krouter-installer-windows.exe ./cmd/krouter-installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.name }}
          path: dist/

  package-macos:
    name: Package macOS DMG
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download darwin binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-darwin
          path: dist/

      - name: Build DMG
        run: |
          chmod +x packaging/macos/build-dmg.sh
          VERSION=${{ github.ref_name }} DIST=dist bash packaging/macos/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-macos
          path: dist/krouter-*-macos.dmg

  package-appimage:
    name: Package Linux AppImage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: dist/

      - name: Build AppImage (amd64)
        run: |
          chmod +x packaging/appimage/build.sh
          VERSION=${{ github.ref_name }} ARCH=x86_64 DIST=dist bash packaging/appimage/build.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-appimage
          path: dist/krouter-*-x86_64.AppImage

  package-windows:
    name: Package Windows NSIS installer
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows
          path: dist/

      - name: Install NSIS
        run: sudo apt-get install -y nsis

      - name: Substitute version in .nsi
        run: |
          sed "s/{{VERSION}}/${{ github.ref_name }}/g" \
            packaging/windows.nsi > windows_versioned.nsi

      - name: Build NSIS installer
        run: makensis windows_versioned.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: dist/krouter-*-setup.exe

  release:
    name: Publish release
    needs: [build, package-macos, package-appimage, package-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create archives and checksums
        run: |
          cd dist
          VERSION=${{ github.ref_name }}
          chmod +x krouter-linux-amd64 krouter-linux-arm64 krouter-apple-macos \
                   krouter-installer-linux-amd64 krouter-installer-linux-arm64 \
                   krouter-installer-apple-macos
          # Per-platform tarballs (daemon + installer together).
          tar -czf krouter_${VERSION}_linux_amd64.tar.gz \
            krouter-linux-amd64 krouter-installer-linux-amd64
          tar -czf krouter_${VERSION}_linux_arm64.tar.gz \
            krouter-linux-arm64 krouter-installer-linux-arm64
          tar -czf krouter_${VERSION}_apple-macos.tar.gz \
            krouter-apple-macos krouter-installer-apple-macos
          zip krouter_${VERSION}_windows.zip \
            krouter-windows.exe krouter-installer-windows.exe
          sha256sum \
            krouter_*.tar.gz \
            krouter_*.zip \
            krouter-*-macos.dmg \
            krouter-*-x86_64.AppImage \
            krouter-*-setup.exe \
            > checksums.txt

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          ASSETS="dist/krouter_*.tar.gz dist/krouter_*.zip dist/krouter-*-macos.dmg dist/krouter-*-x86_64.AppImage dist/krouter-*-setup.exe dist/checksums.txt"
          if gh release view ${VERSION} &>/dev/null; then
            gh release upload ${VERSION} --clobber $ASSETS
          else
            gh release create ${VERSION} \
              --title "krouter ${VERSION}" \
              --notes "See [CHANGELOG](https://github.com/kinthaiofficial/krouter/blob/main/CHANGELOG.md) for details." \
              $ASSETS
          fi

      - name: Generate and sign manifest.json
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          echo "$SIGNING_PRIVATE_KEY" > /tmp/signing_key.pem
          go run scripts/gen-manifest.go \
            -version=${{ github.ref_name }} \
            -dist=dist \
            -key=/tmp/signing_key.pem \
            -repo=kinthaiofficial/krouter \
            -out=dist/manifest.json
          rm -f /tmp/signing_key.pem

      - name: Upload manifest and bare binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # manifest.json + sig (for auto-updater signature verification)
          # Bare binaries (manifest URLs point directly to these, not to archives)
          gh release upload ${{ github.ref_name }} --clobber \
            dist/manifest.json \
            dist/manifest.json.sig \
            dist/krouter-linux-amd64 \
            dist/krouter-linux-arm64 \
            dist/krouter-apple-macos \
            dist/krouter-windows.exe
