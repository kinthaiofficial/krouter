name: Sync pricing data to krouter.kinthai.ai

on:
  push:
    branches: [main]
    paths: ['data/token_price_sub.json']

# Run JavaScript-based actions (checkout, …) on Node.js 24 now, ahead of GitHub
# forcing it on 2026-06-02. Becomes a no-op once Node 24 is the default runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync data file
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            data/token_price_sub.json \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/krouter.kinthai.ai/data/

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
