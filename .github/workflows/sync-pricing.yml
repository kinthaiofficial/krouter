name: Sync pricing data to krouter.kinthai.ai

on:
  push:
    branches: [main]
    paths:
      - 'data/token_price_sub.json'
      - 'data/token_prices.json'
      - 'data/free_tokens.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server pull
        env:
          PAYLOAD: '{"repo":"krouter","event":"pricing-update"}'
          SECRET: ${{ secrets.SYNC_WEBHOOK_SECRET }}
        run: |
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')"
          curl -sf --max-time 15 \
            -X POST https://krouter.kinthai.ai:9001/webhook/krouter-pricing \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
