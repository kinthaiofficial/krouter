name: Mirror a release to Tencent COS (manual backfill)

# Manual tool to (re)mirror a given release's assets to the Tencent COS bucket.
#
# Routine releases are mirrored automatically by the "Mirror to Tencent COS"
# step inside release.yml — this workflow is only for backfilling an old release
# or retrying after a failed mirror. (A release published via the default
# GITHUB_TOKEN can't trigger on:release workflows, which is why mirroring lives
# in release.yml and this is dispatch-only.)
#
# Required repo secrets: TENCENT_SECRET_ID / TENCENT_SECRET_KEY / TENCENT_COS_BUCKET

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to mirror, e.g. v2.4.19'
        required: true

env:
  COS_REGION: ap-guangzhou

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dist
          gh release download "$VERSION" --repo "${{ github.repository }}" \
            --pattern "manifest.json" \
            --pattern "manifest.json.sig" \
            --pattern "krouter-linux-amd64" \
            --pattern "krouter-linux-arm64" \
            --pattern "krouter-apple-macos" \
            --pattern "krouter-windows.exe" \
            --dir dist/
          ls -la dist/

      - name: Upload to COS (S3-compatible API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TENCENT_SECRET_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ env.COS_REGION }}
          BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ENDPOINT="https://cos.${COS_REGION}.myqcloud.com"
          # COS rejects path-style; force virtual-hosted (<bucket>.cos.<region>...).
          aws configure set s3.addressing_style virtual
          # COS multipart UploadPart needs Content-Length, which the aws CLI omits
          # on chunked uploads. Raise the threshold so binaries go as single PUTs.
          aws configure set s3.multipart_threshold 1GB

          # Versioned, immutable copy — manifest.json binary URLs point here.
          aws s3 sync dist/ "s3://${BUCKET}/krouter/${VERSION}/" \
            --endpoint-url "$ENDPOINT" --no-progress

          # latest/ — the daemon's fallback manifest URL is
          # https://<bucket>.cos.<region>.myqcloud.com/krouter/latest/manifest.json
          aws s3 sync dist/ "s3://${BUCKET}/krouter/latest/" \
            --endpoint-url "$ENDPOINT" --no-progress

          echo "Mirrored $VERSION to s3://${BUCKET}/krouter/{${VERSION},latest}/"
